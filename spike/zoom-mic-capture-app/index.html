<!DOCTYPE html>
<html>
<head><title>GleaMeet Zoom Mic-Capture Spike</title></head>
<body>
  <h1>Zoom Mic-Capture Spike (Path B)</h1>
  <p>Only probes the local user's own microphone — never taps other participants'
  audio or the meeting's mixed stream. This is the privacy-preserving alternative to RTMS.</p>
  <button id="probe">Start mic probe</button>
  <button id="stop" disabled>Stop</button>
  <pre id="log"></pre>
  <script src="https://appssdk.zoom.us/sdk.js"></script>
  <script>
    const log = (label, data) => {
      document.getElementById('log').textContent += `\n${label}: ${typeof data === 'string' ? data : JSON.stringify(data, null, 2)}`;
      console.log(label, data);
    };

    let stream, recorder, chunks = [];

    window.onload = async () => {
      try {
        const zoomSdk = window.zoomSdk;
        const config = await zoomSdk.config({
          capabilities: ['getMeetingContext', 'getRunningContext', 'getUserContext'],
        });
        log('config', config);
        log('meetingContext', await zoomSdk.getMeetingContext());
        log('runningContext', await zoomSdk.getRunningContext());
      } catch (err) {
        log('ERROR (zoomSdk init)', err.message || err);
      }
    };

    document.getElementById('probe').onclick = async () => {
      try {
        // Step: request mic access. Record whether this succeeds, and whether
        // the track is 'live' or fails with NotReadableError (device held by
        // the Zoom call itself — the device-conflict case from the plan).
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const track = stream.getAudioTracks()[0];
        log('track.label', track.label);
        log('track.readyState', track.readyState);

        chunks = [];
        recorder = new MediaRecorder(stream);
        recorder.ondataavailable = (e) => {
          chunks.push(e.data);
          log('chunk received, bytes', e.data.size);
        };
        recorder.start(1000); // 1s chunks, mirrors the extension's chunked capture
        log('MediaRecorder', 'started');
        document.getElementById('stop').disabled = false;
        document.getElementById('probe').disabled = true;
      } catch (err) {
        // NotReadableError here is the exact device-conflict signal the plan
        // asks us to test: does getUserMedia fail while Zoom holds the mic
        // for the call itself?
        log('ERROR (getUserMedia)', `${err.name}: ${err.message}`);
      }
    };

    document.getElementById('stop').onclick = () => {
      recorder?.stop();
      stream?.getTracks().forEach((t) => t.stop());
      log('stopped', `total chunks: ${chunks.length}`);
      document.getElementById('stop').disabled = true;
      document.getElementById('probe').disabled = false;
    };
  </script>
</body>
</html>
