services:
  - type: web
    name: gleameet-backend
    runtime: node
    buildCommand: npm install && npm run build -w packages/shared && npm run build -w packages/law-registry && npm run build -w packages/backend
    startCommand: node packages/backend/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PG_DATABASE
        sync: false
      - key: PG_HOST
        sync: false
      - key: PG_USER
        sync: false
      - key: PG_PASSWORD
        sync: false
      - key: REDIS_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
