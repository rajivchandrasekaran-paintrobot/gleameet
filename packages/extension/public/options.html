<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GleaMeet Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 {
      font-size: 20px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
    }
    input[type="url"] {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }
    button {
      margin-top: 16px;
      padding: 8px 20px;
      font-size: 14px;
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #3367d6; }
    #status {
      margin-top: 12px;
      font-size: 13px;
      color: #0b8043;
    }
  </style>
</head>
<body>
  <h1>GleaMeet Settings</h1>
  <label for="backendUrl">Backend URL</label>
  <input type="url" id="backendUrl" placeholder="http://localhost:3001">
  <div class="hint">For cloud: paste your Render URL, e.g. https://gleameet-backend.onrender.com</div>
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
